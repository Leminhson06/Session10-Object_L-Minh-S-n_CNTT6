<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const teamHistory = [
        {
          name: "Messi",
          position: "Forward",
          nationality: "Argentina",
          seasons: {
            "2022-2023": {
              matches: 34,
              goals: 21,
              assists: 14,
              yellowCards: 3,
            },
            "2023-2024": {
              matches: 33,
              goals: 25,
              assists: 15,
              yellowCards: 2,
            },
            "2024-2025": {
              matches: 20,
              goals: 10,
              assists: 12,
              yellowCards: 1,
            },
          },
        },
        {
          name: "Ronaldo",
          position: "Forward",
          nationality: "Portugal",
          seasons: {
            "2022-2023": { matches: 38, goals: 28, assists: 8, yellowCards: 5 },
            "2023-2024": {
              matches: 45,
              goals: 38,
              assists: 10,
              yellowCards: 4,
            },
            "2024-2025": { matches: 30, goals: 22, assists: 5, yellowCards: 1 },
          },
        },
      ];

      function generatePlayerSeasonReport(playerName, teamHistory) {
        const player = teamHistory.find((p) => p.name === playerName);

        if (!player) {
          return `Khong tim thay cau thu [${playerName}]`;
        }

        const seasonList = Object.entries(player.seasons);

        let totalMatches = 0;
        let totalGoals = 0;
        let totalAssists = 0;
        let totalYellowCards = 0;

        seasonList.forEach(([, stats]) => {
          totalMatches += stats.matches;
          totalGoals += stats.goals;
          totalAssists += stats.assists;
          totalYellowCards += stats.yellowCards;
        });

        const averageGoalsPerMatch = parseFloat(
          (totalGoals / totalMatches).toFixed(2)
        );
        const averageAssistsPerMatch = parseFloat(
          (totalAssists / totalMatches).toFixed(2)
        );

        let bestSeasonName = null;
        let bestSeasonData = null;

        seasonList.forEach(([seasonName, stats]) => {
          if (
            !bestSeasonData ||
            stats.goals > bestSeasonData.goals ||
            (stats.goals === bestSeasonData.goals &&
              stats.assists > bestSeasonData.assists)
          ) {
            bestSeasonName = seasonName;
            bestSeasonData = stats;
          }
        });

        const report = {
          name: player.name,
          position: player.position,
          nationality: player.nationality,
          careerStats: {
            totalMatches,
            totalGoals,
            totalAssists,
            totalYellowCards,
            averageGoalsPerMatch,
            averageAssistsPerMatch,
            bestSeason: {
              season: bestSeasonName,
              goals: bestSeasonData.goals,
              assists: bestSeasonData.assists,
            },
          },
        };

        return report;
      }

      console.log(generatePlayerSeasonReport("Messi", teamHistory));
      console.log(generatePlayerSeasonReport("Ronaldo", teamHistory));
      console.log(generatePlayerSeasonReport("Neymar", teamHistory));
    </script>
  </body>
</html>
