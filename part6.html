<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const players = [
  { name: "Messi",   position: "Forward",    age: 36, goals: 25, assists: 15, matches: 34, yellowCards: 2 },
  { name: "Ronaldo", position: "Forward",    age: 38, goals: 30, assists: 10, matches: 38, yellowCards: 4 },
  { name: "Neymar",  position: "Forward",    age: 32, goals: 18, assists: 12, matches: 32, yellowCards: 5 },
  { name: "De Bruyne", position: "Midfielder", age: 33, goals: 8, assists: 25, matches: 36, yellowCards: 3 },
  { name: "Kante",   position: "Midfielder", age: 33, goals: 2, assists: 5,  matches: 36, yellowCards: 0 },
  { name: "Van Dijk", position: "Defender",  age: 32, goals: 5, assists: 3,  matches: 35, yellowCards: 2 },
  { name: "Alisson",  position: "Goalkeeper", age: 31, goals: 0, assists: 1, matches: 37, yellowCards: 0 },
];

function generateRankingReport(minMatches, players) {
  const filtered = players.filter((p) => p.matches >= minMatches);

  const withStats = filtered.map((p) => {
    const performanceScore = parseFloat(((p.goals + p.assists) / p.matches).toFixed(2));
    const efficiencyScore = parseFloat((performanceScore - (p.yellowCards / p.matches) * 10).toFixed(2));
    return { ...p, performanceScore, efficiencyScore };
  });

  const ranked = withStats.sort((a, b) => {
    if (b.efficiencyScore !== a.efficiencyScore) return b.efficiencyScore - a.efficiencyScore;
    if (b.performanceScore !== a.performanceScore) return b.performanceScore - a.performanceScore;
    if (b.goals !== a.goals) return b.goals - a.goals;
    return 0;
  });

  console.log(`XEP HANG DOI BONG (tu minMatches tro len)`);
  ranked.forEach((p, i) => {
    console.log(
      `${i + 1}. ${p.name.padEnd(10)} - Efficiency: ${p.efficiencyScore.toFixed(2)} | Performance: ${p.performanceScore.toFixed(2)} | Goals: ${p.goals}`
    );
  });

  console.log(`\nTong so cau thu xep hang: ${ranked.length}`);
  console.log(`Cau thu xuat sac nhat: ${ranked[0].name}`);

  const avgEfficiency = parseFloat(
    (ranked.reduce((sum, p) => sum + p.efficiencyScore, 0) / ranked.length).toFixed(2)
  );
  console.log(`Trung binh efficiency top ${ranked.length}: ${avgEfficiency.toFixed(2)}`);
}

generateRankingReport(30, players);
    </script>
</body>
</html>
